name: Deploy static content to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy_second.outputs.page_url || steps.deploy_first.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages (attempt 1)
        id: deploy_first
        uses: actions/deploy-pages@v5
        with:
          timeout: 1800000
        continue-on-error: true

      - name: Deploy to GitHub Pages (attempt 2)
        id: deploy_second
        if: steps.deploy_first.outcome == 'failure'
        uses: actions/deploy-pages@v5
        with:
          timeout: 1800000

      - name: Fail if both deploy attempts failed
        if: steps.deploy_first.outcome == 'failure' && steps.deploy_second.outcome == 'failure'
        run: |
          echo "Pages deployment failed twice."
          exit 1
